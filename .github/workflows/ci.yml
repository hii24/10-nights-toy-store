name: CI

# Pipeline: lint -> format-check -> build -> TestEZ (real engine via Open Cloud Luau Execution).
# On push to `main` with green tests: `deploy` job publishes the place via Open Cloud (P1-11).
# Deploy = lightweight Open Cloud publish (не Mantle — см. журнал P1-11): тот же OPEN_CLOUD_API_KEY.

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain (Rokit)
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Install dependencies (Wally)
        run: wally install

      - name: Lint (Selene)
        run: selene src

      - name: Format check (StyLua)
        run: stylua --check src

      - name: Build (Rojo)
        run: rojo build --output game.rbxlx

      - name: Tests (TestEZ via Open Cloud)
        env:
          OPEN_CLOUD_API_KEY: ${{ secrets.OPEN_CLOUD_API_KEY }}
        run: |
          if [ -z "$OPEN_CLOUD_API_KEY" ]; then
            echo "::notice::No OPEN_CLOUD_API_KEY (fork/external PR) — skipping engine TestEZ run."
            exit 0
          fi
          rojo build --output game.rbxl
          lune run scripts/run-tests

  # P1-11: авто-деплой в прод-плейс на мёрдж в main (только если lint-build-test зелёный).
  deploy:
    name: Deploy (Open Cloud publish, main only)
    needs: lint-build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain (Rokit)
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Install dependencies (Wally)
        run: wally install

      - name: Build (Rojo)
        run: rojo build --output game.rbxl

      - name: Deploy (publish to place)
        env:
          OPEN_CLOUD_API_KEY: ${{ secrets.OPEN_CLOUD_API_KEY }}
        run: |
          if [ -z "$OPEN_CLOUD_API_KEY" ]; then
            echo "::error::No OPEN_CLOUD_API_KEY — cannot deploy."
            exit 1
          fi
          lune run scripts/deploy
