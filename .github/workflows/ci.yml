name: CI

# Pipeline: lint -> format-check -> build (+ test placeholder).
# Real TestEZ via Open Cloud is P0-10 (needs scripts/run-tests.luau + OPEN_CLOUD_API_KEY).
# Deploy (Mantle) is Phase 1-2 (see docs/05).

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain (Rokit)
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Install dependencies (Wally)
        run: wally install

      - name: Lint (Selene)
        run: selene src

      - name: Format check (StyLua)
        run: stylua --check src

      - name: Build (Rojo)
        run: rojo build --output game.rbxlx

      - name: Tests (deferred to P0-10)
        env:
          OPEN_CLOUD_API_KEY: ${{ secrets.OPEN_CLOUD_API_KEY }}
        run: |
          if [ -z "$OPEN_CLOUD_API_KEY" ] || [ ! -f scripts/run-tests.luau ]; then
            echo "::notice::TestEZ via Open Cloud deferred to P0-10 (no key or runner yet). Skipping."
            exit 0
          fi
          lune run scripts/run-tests
