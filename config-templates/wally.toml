# wally.toml — зависимости. Версии проверь на wally.run / в репозиториях.
[package]
name = "you/ten-nights-toy-store"
version = "0.1.0"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"

[dependencies]
Knit = "sleitnick/knit@1.7.0"
Fusion = "elttob/fusion@0.3.0"
# ProfileStore — нужен только на Фазе 1 (P1-08, персистентность). Официально это одиночный
# ModuleScript (manual из Roblox library); официального пакета в реестре Wally НЕТ
# (есть лишь сторонние реаплоады — не доверяем без проверки). Подключить на Фазе 1:
# вендорнуть официальный модуль в src/shared ИЛИ взять проверенный источник.
# ProfileStore = "madstudioroblox/profilestore@1.0.0"  # ← не существует в реестре

[dev-dependencies]
TestEZ = "roblox/testez@0.4.1"
